# Email Configuration Properties
# Last updated: 2025-04-14

# SMTP Server Configuration
mail.smtp.host=smtp.example.com
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.smtp.connectiontimeout=5000
mail.smtp.timeout=5000
mail.smtp.ssl.trust=smtp.example.com

# Authentication Credentials
mail.username=notifications@taskmanager.com
mail.password=email_password_here

# Sender Configuration
mail.from.address=notifications@taskmanager.com
mail.from.name=Task Manager

# Email Templates Directory
mail.templates.path=/templates/email/

# Notification Settings
mail.notification.enabled=true
mail.task.reminder.enabled=true
mail.project.update.enabled=true
mail.team.invitation.enabled=true

# Batch Processing
mail.batch.size=50
mail.max.retries=3
mail.retry.delay.seconds=300

# Bounce Handling
mail.bounce.address=bounces@taskmanager.com
mail.process.bounces=true